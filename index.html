<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Reasoning Lab — Verbal &amp; Quantitative Workout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141133; --bg-2:#1a1640;
    --panel:#221d4d; --panel-2:#2a2458;
    --line:#3a3470; --line-soft:#2c2760;
    --violet:#a78bfa;      /* verbal accent */
    --violet-dim:#6d5bc7;
    --teal:#34d3b0;        /* quantitative accent */
    --teal-dim:#1f8f78;
    --amber:#ffce4d; --coral:#ff6b8a; --lime:#7be495;
    --text:#f0edff; --muted:#a99fd6; --muted-2:#7c72ac;
    --display:'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif;
    --body:'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--body); color:var(--text);
    background:
      radial-gradient(1000px 600px at 50% -12%, #2b2170 0%, transparent 60%),
      radial-gradient(900px 500px at 100% 110%, #1a3a56 0%, transparent 55%),
      linear-gradient(180deg, var(--bg) 0%, #0e0b24 100%);
    min-height:100%; display:flex; flex-direction:column; align-items:center;
    padding:18px 16px 44px;
  }
  .wrap{width:100%; max-width:820px;}

  header{display:flex; align-items:center; gap:14px; margin-bottom:20px;}
  .badge{
    width:46px;height:46px;border-radius:13px;flex:none;
    background:linear-gradient(145deg,var(--violet),var(--teal));
    display:grid;place-items:center;
    box-shadow:0 6px 20px rgba(167,139,250,.32), inset 0 0 0 1px rgba(255,255,255,.25);
  }
  .badge span{font-family:var(--display); font-weight:700; font-size:22px; color:#141133;}
  .titles h1{font-family:var(--display); font-weight:700; font-size:21px; margin:0; line-height:1;}
  .titles p{margin:4px 0 0; font-size:12.5px; color:var(--muted); letter-spacing:.2px;}
  .rankbar{margin-left:auto; text-align:right; min-width:150px;}
  .rankname{font-family:var(--display); font-weight:600; font-size:13px; color:var(--amber); letter-spacing:.3px;}
  .xpwrap{margin-top:6px; height:8px; width:150px; background:#0e0b24; border-radius:99px; overflow:hidden; border:1px solid var(--line);}
  .xpfill{height:100%; width:0%; background:linear-gradient(90deg,var(--violet),var(--teal)); transition:width .5s cubic-bezier(.2,.8,.2,1);}
  .xpnum{font-size:11px; color:var(--muted-2); margin-top:4px;}

  .section-label{font-family:var(--display); font-weight:600; font-size:12px; letter-spacing:1.4px;
    text-transform:uppercase; margin:6px 2px 12px; display:flex; align-items:center; gap:10px;}
  .section-label.verbal{color:var(--violet);} .section-label.quant{color:var(--teal);}
  .section-label::after{content:''; flex:1; height:1px; background:var(--line-soft);}

  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:13px; margin-bottom:22px;}
  .card{
    text-align:left; cursor:pointer; position:relative; overflow:hidden;
    background:linear-gradient(160deg,var(--panel),var(--bg-2));
    border:1px solid var(--line); border-radius:14px; padding:15px 14px;
    transition:transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover{transform:translateY(-3px); box-shadow:0 12px 26px rgba(0,0,0,.4);}
  .card.v:hover{border-color:var(--violet-dim);} .card.q:hover{border-color:var(--teal-dim);}
  .card .ic{font-size:22px; margin-bottom:9px; display:block;}
  .card h3{font-family:var(--display); font-weight:600; font-size:15px; margin:0 0 5px;}
  .card p{margin:0; font-size:11.5px; color:var(--muted); line-height:1.45;}
  .lvlchip{position:absolute; top:12px; right:12px; font-family:var(--display); font-weight:600;
    font-size:9.5px; letter-spacing:.4px; color:#141133; padding:3px 7px; border-radius:99px;}
  .card.v .lvlchip{background:var(--violet);} .card.q .lvlchip{background:var(--teal);}
  .hometip{font-size:12px; color:var(--muted-2); text-align:center; margin-top:-8px;}

  #play{display:none;}
  .playbar{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
  .back{font-family:var(--display); font-weight:600; font-size:13px; color:var(--muted);
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 13px; cursor:pointer;
    display:flex; align-items:center; gap:6px;}
  .back:hover{color:var(--text);}
  .playmeta{margin-left:auto; display:flex; gap:16px;}
  .metaItem{text-align:center;}
  .metaItem .k{font-size:9.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted-2);}
  .metaItem .v{font-family:var(--display); font-weight:600; font-size:16px; line-height:1.1;}
  .streak .v{color:var(--amber);}

  .prompt{font-family:var(--display); font-weight:600; font-size:16px; text-align:center;
    margin:2px auto 4px; max-width:620px; line-height:1.4; color:var(--muted);}

  .stage{background:linear-gradient(160deg,var(--panel),var(--bg-2)); border:1px solid var(--line);
    border-radius:16px; padding:26px 20px; display:flex; flex-direction:column; align-items:center; gap:22px;}

  .stem{font-family:var(--display); font-weight:600; text-align:center; line-height:1.45;}
  .stem.big{font-size:26px;} .stem.mid{font-size:21px;} .stem.analogy{font-size:22px; letter-spacing:.3px;}
  .stem .hl{color:var(--violet);} .stem .num{color:var(--teal);}
  .word-chip{display:inline-block; background:var(--panel-2); border:1px solid var(--line);
    border-radius:9px; padding:2px 12px; margin:0 2px;}

  .cols-compare{display:flex; gap:16px; align-items:stretch; justify-content:center; flex-wrap:wrap;}
  .colbox{background:#0e0b24; border:1.5px solid var(--line); border-radius:14px; padding:16px 22px; min-width:150px; text-align:center;}
  .colbox .lab{font-size:10.5px; letter-spacing:.8px; text-transform:uppercase; color:var(--muted-2); margin-bottom:8px;}
  .colbox .expr{font-family:var(--display); font-weight:700; font-size:26px; color:var(--teal);}
  .vs{align-self:center; font-family:var(--display); font-weight:700; color:var(--muted-2);}

  .clues{list-style:none; padding:0; margin:0; max-width:460px; width:100%;}
  .clues li{background:#0e0b24; border:1px solid var(--line); border-left:3px solid var(--violet);
    border-radius:9px; padding:10px 14px; margin-bottom:8px; font-size:14.5px; color:var(--text);}
  .scenario{font-size:14px; color:var(--muted); text-align:center; max-width:460px;}

  .seq{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .seq .term{min-width:52px; height:52px; display:grid; place-items:center; border-radius:11px;
    background:#0e0b24; border:1.5px solid var(--line); font-family:var(--display); font-weight:700; font-size:20px;}
  .seq .term.q{border-style:dashed; border-color:var(--teal); color:var(--teal); font-size:26px;}

  .opts{display:grid; gap:11px; width:100%; max-width:520px;}
  .opts.c2{grid-template-columns:repeat(2,1fr);} .opts.c3{grid-template-columns:repeat(3,1fr);}
  .opt{background:#0e0b24; border:1.5px solid var(--line); border-radius:12px; padding:14px 12px;
    cursor:pointer; text-align:center; font-family:var(--display); font-weight:600; font-size:17px;
    transition:border-color .12s, background .12s, transform .1s; min-height:52px; display:grid; place-items:center;}
  .opt:hover{transform:translateY(-2px);}
  .opts.verbal .opt:hover{border-color:var(--violet);} .opts.quant .opt:hover{border-color:var(--teal);}
  .opt.pick-right{border-color:var(--lime); background:rgba(123,228,149,.15);}
  .opt.pick-wrong{border-color:var(--coral); background:rgba(255,107,138,.15);}
  .opt.reveal-right{border-color:var(--lime); box-shadow:0 0 0 1px var(--lime) inset;}
  .opt.locked{pointer-events:none;}

  .feedback{min-height:22px; text-align:center; font-size:13.5px; line-height:1.55; max-width:600px; margin:14px auto 0; color:var(--muted);}
  .feedback.good{color:var(--lime);} .feedback.bad{color:var(--coral);}
  .feedback b{color:var(--text);} .feedback .why{color:var(--muted); display:block; margin-top:4px; font-size:12.5px;}
  .controls{display:flex; gap:12px; justify-content:center; margin-top:18px;}
  .btn{font-family:var(--display); font-weight:600; font-size:15px; padding:12px 26px; border-radius:12px;
    border:none; cursor:pointer; color:#141133;
    background:linear-gradient(145deg,var(--violet),var(--teal)); box-shadow:0 6px 16px rgba(167,139,250,.3);
    transition:transform .12s, filter .12s;}
  .btn:hover{filter:brightness(1.07); transform:translateY(-2px);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(30px);
    background:var(--panel-2); border:1px solid var(--violet-dim); color:var(--text);
    padding:12px 20px; border-radius:12px; font-family:var(--display); font-weight:600; font-size:14px;
    opacity:0; pointer-events:none; transition:all .35s cubic-bezier(.2,.8,.2,1); box-shadow:0 10px 30px rgba(0,0,0,.45); z-index:50;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ---- countdown timer ---- */
  .timerwrap{width:100%; height:7px; background:#0e0b24; border:1px solid var(--line);
    border-radius:99px; overflow:hidden; margin:-4px 0 14px; display:none;}
  .timerwrap.on{display:block;}
  .timebar{height:100%; width:100%; border-radius:99px;
    background:linear-gradient(90deg,var(--teal),var(--violet));}
  .timebar.warn{background:linear-gradient(90deg,var(--amber),var(--coral));}
  .feedback.timeup{color:var(--amber);}

  /* ---- home controls ---- */
  .homebar{display:flex; align-items:center; justify-content:space-between; gap:16px;
    margin:0 2px 18px; flex-wrap:wrap;}
  .switch{display:flex; align-items:center; gap:11px; cursor:pointer; user-select:none;}
  .switch input{position:absolute; opacity:0; width:1px; height:1px;}
  .track{width:44px; height:25px; border-radius:99px; background:#0e0b24; border:1px solid var(--line);
    position:relative; transition:background .18s, border-color .18s; flex:none;}
  .knob{position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:50%;
    background:var(--muted-2); transition:transform .18s, background .18s;}
  .switch input:checked + .track{background:var(--teal-dim); border-color:var(--teal);}
  .switch input:checked + .track .knob{transform:translateX(19px); background:var(--text);}
  .switch input:focus-visible + .track{outline:2px solid var(--violet); outline-offset:2px;}
  .switch .lbl{font-family:var(--display); font-weight:600; font-size:13.5px; line-height:1.25;}
  .switch .sub{display:block; font-family:var(--body); font-weight:400; font-size:11px; color:var(--muted-2);}
  .homeright{text-align:right;}
  .stats{font-size:11.5px; color:var(--muted-2);}
  .stats b{color:var(--muted); font-weight:600;}
  .stats .warnnote{color:var(--amber);}
  .linkbtn{background:none; border:none; color:var(--muted-2); font-size:11.5px; cursor:pointer;
    text-decoration:underline; padding:2px 0 0; font-family:var(--body);}
  .linkbtn:hover{color:var(--coral);}

  @media (max-width:620px){
    .grid{grid-template-columns:1fr;}
    .stem.big{font-size:22px;} .stem.analogy{font-size:19px;} .stem.mid{font-size:18px;}
    .rankbar{min-width:120px;} .xpwrap{width:120px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge"><span>?!</span></div>
    <div class="titles">
      <h1>Reasoning Lab</h1>
      <p id="subtitle">Verbal &amp; quantitative reasoning workout</p>
    </div>
    <div class="rankbar">
      <div class="rankname" id="rankName">Rookie</div>
      <div class="xpwrap"><div class="xpfill" id="xpFill"></div></div>
      <div class="xpnum" id="xpNum">0 XP</div>
    </div>
  </header>

  <div id="home">
    <div class="homebar">
      <label class="switch">
        <input type="checkbox" id="timedToggle">
        <span class="track"><span class="knob"></span></span>
        <span class="lbl">Timed mode<span class="sub">Adds a countdown to build test pacing</span></span>
      </label>
      <div class="homeright">
        <div class="stats" id="statsLine"></div>
        <button class="linkbtn" id="resetBtn">Reset progress</button>
      </div>
    </div>
    <div class="section-label verbal">Verbal reasoning · words &amp; relationships</div>
    <div class="grid" id="verbalGrid"></div>
    <div class="section-label quant">Quantitative reasoning · numbers &amp; logic</div>
    <div class="grid" id="quantGrid"></div>
    <div class="hometip">Each workshop gets harder as your streak grows. Every answer explains the “why”.</div>
  </div>

  <div id="play">
    <div class="playbar">
      <button class="back" id="backBtn">‹ Workshops</button>
      <div class="playmeta">
        <div class="metaItem"><div class="k">Level</div><div class="v" id="mLevel">1</div></div>
        <div class="metaItem streak"><div class="k">Streak</div><div class="v" id="mStreak">0</div></div>
      </div>
    </div>
    <div class="timerwrap" id="timerWrap"><div class="timebar" id="timeBar"></div></div>
    <div class="prompt" id="prompt"></div>
    <div class="stage" id="stage"></div>
    <div class="controls"><button class="btn" id="nextBtn" style="display:none">Next →</button></div>
    <p class="feedback" id="feedback"></p>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const choice=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=rand(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;};

/* ---------------- progress + rank ---------------- */
const RANKS=[
  {name:'Rookie',xp:0},{name:'Thinker',xp:120},{name:'Puzzler',xp:320},
  {name:'Analyst',xp:640},{name:'Strategist',xp:1100},{name:'Mastermind',xp:1800},{name:'Grand Mastermind',xp:2800}
];
const state={xp:0, correct:{}, streak:0, mode:null, used:{}, best:0, total:0, timed:false};

/* ---------------- persistence (survives closing the browser) ---------------- */
const STORE_KEY='reasoningLab.v1';
const Store={
  // some embedded/preview contexts block storage - detect once and degrade quietly
  ok:(function(){try{const k='__probe__';localStorage.setItem(k,'1');localStorage.removeItem(k);return true;}catch(e){return false;}})(),
  load(){ if(!this.ok)return null; try{return JSON.parse(localStorage.getItem(STORE_KEY));}catch(e){return null;} },
  save(o){ if(!this.ok)return; try{localStorage.setItem(STORE_KEY,JSON.stringify(o));}catch(e){} },
  clear(){ if(!this.ok)return; try{localStorage.removeItem(STORE_KEY);}catch(e){} }
};
function persist(){ Store.save({v:1, xp:state.xp, correct:state.correct, best:state.best, total:state.total, timed:state.timed}); }
function restore(){
  const d=Store.load(); if(!d || d.v!==1) return;
  state.xp=d.xp||0; state.correct=d.correct||{}; state.best=d.best||0;
  state.total=d.total||0; state.timed=!!d.timed;
}
const curRank=()=>{let r=RANKS[0];for(const k of RANKS)if(state.xp>=k.xp)r=k;return r;};
const nxtRank=()=>{for(const k of RANKS)if(state.xp<k.xp)return k;return null;};
function refreshRank(){
  const c=curRank(),n=nxtRank();
  $('#rankName').textContent=c.name; $('#xpNum').textContent=state.xp+' XP';
  let p=100; if(n)p=((state.xp-c.xp)/(n.xp-c.xp))*100;
  $('#xpFill').style.width=Math.max(4,Math.min(100,p))+'%';
}
function award(base){const b=curRank().name; state.xp+=base+state.streak*2; refreshRank();
  if(curRank().name!==b) toast('★ Promoted to '+curRank().name+'!');}
const modeLevel=id=>Math.min(6,1+Math.floor((state.correct[id]||0)/4));
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

/* ---------------- timed mode ---------------- */
// Roughly matches real ERB pacing (~35s verbal, ~45s quantitative per question),
// with extra room for multi-clue logic puzzles.
const TIME_BUDGET={analogy:32, synant:26, odd:32, pattern:45, compare:45, logic:60};
let rafId=null, curCh=null;
function timeFor(ch){ return ch.time || TIME_BUDGET[state.mode] || 35; }
function stopTimer(){ if(rafId){cancelAnimationFrame(rafId); rafId=null;} }
function startTimer(secs){
  stopTimer();
  const wrap=$('#timerWrap'), bar=$('#timeBar');
  if(!state.timed){ wrap.classList.remove('on'); return; }
  wrap.classList.add('on');
  bar.classList.remove('warn'); bar.style.width='100%';
  const t0=performance.now(), ms=secs*1000;
  (function step(now){
    const left=Math.max(0, ms-(now-t0));
    bar.style.width=(left/ms*100)+'%';
    bar.classList.toggle('warn', left<=ms*0.25);
    if(left<=0){ rafId=null; onTimeout(); return; }
    rafId=requestAnimationFrame(step);
  })(performance.now());
}
function onTimeout(){
  if(answered || !curCh) return;
  document.querySelectorAll('.opt').forEach(e=>{
    e.classList.add('locked');
    if(e.textContent===String(curCh.correct)) e.classList.add('reveal-right');
  });
  resolve(false, curCh, null, true);
}


/* ---------------- tiny sound ---------------- */
let AC=null;
function beep(f,d,t='sine',v=.07){try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}
const sndRight=()=>{beep(680,.09,'triangle');setTimeout(()=>beep(1020,.13,'triangle'),85);};
const sndWrong=()=>beep(190,.18,'sawtooth',.05);

/* =========================================================================
   VERBAL CONTENT BANKS   (d = difficulty 1..3)
   ========================================================================= */
const ANALOGIES=[
  // ---- part to whole ----
  {a:'finger',b:'hand',c:'toe',ans:'foot',distract:['leg','shoe','sock'],why:'A finger is part of a hand, and a toe is part of a foot.',d:1},
  {a:'petal',b:'flower',c:'leaf',ans:'tree',distract:['green','forest','root'],why:'A petal is part of a flower; a leaf is part of a tree.',d:2},
  {a:'wheel',b:'car',c:'wing',ans:'airplane',distract:['sky','pilot','bird'],why:'A wheel is part of a car; a wing is part of an airplane.',d:2},
  {a:'page',b:'book',c:'brick',ans:'wall',distract:['house','cement','builder'],why:'Many pages make a book; many bricks make a wall.',d:2},
  {a:'key',b:'piano',c:'string',ans:'guitar',distract:['music','player','sound'],why:'A key is part of a piano; a string is part of a guitar.',d:2},
  {a:'crust',b:'bread',c:'peel',ans:'banana',distract:['fruit','yellow','monkey'],why:'The crust is the outside of bread; the peel is the outside of a banana.',d:2},
  {a:'letter',b:'word',c:'word',ans:'sentence',distract:['page','story','alphabet'],why:'Letters build a word; words build a sentence.',d:2},
  {a:'root',b:'tree',c:'foundation',ans:'building',distract:['wall','roof','ground'],why:'A root anchors a tree; a foundation anchors a building.',d:3},
  {a:'branch',b:'tree',c:'tributary',ans:'river',distract:['water','stream','bank'],why:'A branch splits off a tree; a tributary splits off a river.',d:3},
  // ---- young to adult ----
  {a:'puppy',b:'dog',c:'kitten',ans:'cat',distract:['pet','milk','mouse'],why:'A puppy grows into a dog; a kitten grows into a cat.',d:1},
  {a:'cub',b:'bear',c:'calf',ans:'cow',distract:['milk','farm','horse'],why:'A cub is a baby bear; a calf is a baby cow.',d:2},
  {a:'chick',b:'chicken',c:'lamb',ans:'sheep',distract:['wool','farm','goat'],why:'A chick grows into a chicken; a lamb grows into a sheep.',d:2},
  {a:'foal',b:'horse',c:'piglet',ans:'pig',distract:['mud','farm','cow'],why:'A foal is a baby horse; a piglet is a baby pig.',d:2},
  {a:'fawn',b:'deer',c:'duckling',ans:'duck',distract:['pond','feather','swan'],why:'A fawn is a baby deer; a duckling is a baby duck.',d:2},
  {a:'caterpillar',b:'butterfly',c:'tadpole',ans:'frog',distract:['pond','tail','fish'],why:'A caterpillar becomes a butterfly; a tadpole becomes a frog.',d:3},
  {a:'joey',b:'kangaroo',c:'cub',ans:'lion',distract:['jungle','mane','tiger'],why:'A joey is a baby kangaroo; a cub is a baby lion.',d:3},
  // ---- opposites ----
  {a:'hot',b:'cold',c:'up',ans:'down',distract:['high','ladder','sky'],why:'Hot and cold are opposites, like up and down.',d:1},
  {a:'wet',b:'dry',c:'day',ans:'night',distract:['sun','morning','light'],why:'Wet and dry are opposites, like day and night.',d:1},
  {a:'up',b:'down',c:'left',ans:'right',distract:['side','turn','wrong'],why:'Up/down and left/right are opposite pairs.',d:1},

/* =========================================================================
   VERBAL MODES
   ========================================================================= */
function pickItem(bank, key, level){
  // difficulty band: easy levels stay concrete; high levels drop the easiest items entirely
  const [lo,hi] = level<=2 ? [1,1] : level<=4 ? [1,2] : [2,3];
  const pool = bank.filter(x=>x.d>=lo && x.d<=hi);
  const used = state.used[key] = state.used[key]||new Set();
  let avail = pool.filter(x=>!used.has(x));
  if(!avail.length){ used.clear(); avail=pool; }   // exhausted the band -> start a fresh cycle
  const it=choice(avail); used.add(it); return it;
}
const modeAnalogy={ id:'analogy', track:'verbal',
  gen(level){ const it=pickItem(ANALOGIES,'analogy',level);
    return {
      prompt:'Finish the analogy',
      stemHTML:`<span class="stem analogy"><span class="hl">${it.a}</span> is to <span class="hl">${it.b}</span> &nbsp;as&nbsp; <span class="hl">${it.c}</span> is to <b>?</b></span>`,
      options: shuffle([it.ans,...it.distract]), correct:it.ans, why:it.why, cls:'verbal'
    };
  }
};
const modeSynAnt={ id:'synant', track:'verbal',
  gen(level){ const it=pickItem(SYNANT,'synant',level);
    const q = it.kind==='Synonym' ? 'means the <span class="hl">SAME</span> as' : 'is the <span class="hl">OPPOSITE</span> of';
    return {

      options: shuffle([it.ans,...it.distract].map(s=>s.trim())), correct:it.ans.trim(),
      why:(it.kind==='Synonym'?'“'+it.ans+'” is closest in meaning to “'+it.word+'.”':'“'+it.ans+'” is the opposite of “'+it.word+'.”'),
      cls:'verbal'
    };
  }
};

/* =========================================================================
   QUANTITATIVE MODES (procedurally generated + self-checked)
   ========================================================================= */
// -- Number patterns --
function genPattern(level){
  const types = level<=1 ? ['add','sub','mul']
            : level<=3 ? ['add','sub','mul','addgrow','square']
            : ['mul','addgrow','square','fib','interleave','multadd'];
  const type=choice(types);
  let seq=[], why='';
  if(type==='add'){ const s=rand(1,9),d=rand(2,6); for(let i=0;i<5;i++)seq.push(s+i*d); why=`Each number goes up by ${d}.`; }
  else if(type==='sub'){ const d=rand(2,6),s=rand(30,50); for(let i=0;i<5;i++)seq.push(s-i*d); why=`Each number goes down by ${d}.`; }
  else if(type==='mul'){ const r=rand(2,3),s=rand(1,3); for(let i=0;i<5;i++)seq.push(s*Math.pow(r,i)); why=`Each number is multiplied by ${r}.`; }
  else if(type==='addgrow'){ const s=rand(1,4); let v=s,add=rand(1,2); seq.push(v);
    const firstAdd=add;
    for(let i=0;i<4;i++){v+=add;seq.push(v);add++;}
    why=`The amount added grows by 1 each step (+${firstAdd}, +${firstAdd+1}, +${firstAdd+2}, …).`; }
  else if(type==='square'){ const s=rand(1,3); for(let i=0;i<5;i++){const n=s+i; seq.push(n*n);} why='These are square numbers (n × n).'; }
  else if(type==='fib'){ let a=rand(1,4),b=rand(2,5); seq=[a,b]; for(let i=0;i<3;i++){seq.push(a+b);a=b;b=seq[seq.length-1];} why='Add the two numbers before it to get the next.'; }
  else if(type==='interleave'){ const s1=rand(1,5),d1=rand(2,4),s2=rand(10,20),d2=rand(3,6); seq=[s1,s2,s1+d1,s2+d2,s1+2*d1]; why='Two patterns take turns: one for odd spots, one for even spots.'; }
  else if(type==='multadd'){ const r=rand(2,3),add=rand(1,3); let v=rand(1,3); seq=[v]; for(let i=0;i<4;i++){v=v*r+add;seq.push(v);} why=`Each step: multiply by ${r}, then add ${add}.`; }
  // ask for the LAST term
  const ans=seq[seq.length-1];
  const shown=seq.slice(0,-1);
  // distractors: build a unique set of exactly 4 that always contains the answer
  const step=seq[seq.length-1]-seq[seq.length-2];
  const set=new Set([ans]);
  const cands=[ans+1,ans-1,ans+2,ans-2,ans+step,ans-step,Math.round(ans*1.5),ans+3,ans-3,ans+5,ans+10,ans*2];
  for(const c of shuffle(cands)){ if(set.size>=4) break; if(c>0 && Number.isFinite(c)) set.add(c); }
  let k=1; while(set.size<4){ if(ans+k>0) set.add(ans+k); k++; }
  const opts=shuffle([...set]);
  return {shown, ans, opts, why};
}
const modePattern={ id:'pattern', track:'quant',
  gen(level){ const p=genPattern(level);
    const terms=p.shown.map(n=>`<span class="term">${n}</span>`).join('')+`<span class="term q">?</span>`;
    return {
      prompt:'What number comes next?',
      stemHTML:`<div class="seq">${terms}</div>`,
      options:p.opts, correct:p.ans, why:p.why, cls:'quant', optClass:'c2'
    };
  }
};
// -- Quantitative comparison --
function genCompare(level){
  function makeExpr(lvl){
    if(lvl<=1){ const x=rand(2,9),y=rand(2,9),op=choice(['+','×']);
      return {t:`${x} ${op} ${y}`, v: op==='+'?x+y:x*y}; }
    if(lvl<=3){ const r=rand(1,3);
      if(r===1){const x=rand(2,9),y=rand(2,6),z=rand(1,9);return{t:`${x} × ${y} + ${z}`,v:x*y+z};}
      if(r===2){const x=rand(20,40),y=rand(2,9),z=rand(2,6);return{t:`${x} − ${y} × ${z}`,v:x-y*z};}
      const half=rand(2,8)*2; return{t:`half of ${half}`,v:half/2};
    }
    const r=rand(1,4);
    if(r===1){const b=rand(3,7);return{t:`${b}²`,v:b*b};}
    if(r===2){const f=choice([[1,'¼',4],[1,'½',2],[3,'¾',4]]); const n=rand(2,8)*f[2]; return{t:`${f[1]} of ${n}`,v:n*f[0]/f[2]};}
    if(r===3){const x=rand(2,6),y=rand(2,6),z=rand(2,5);return{t:`${x} × ${y} × ${z}`,v:x*y*z};}
    const x=rand(2,5);return{t:`${x} × ${x} + ${x}`,v:x*x+x};
  }
  let A=makeExpr(level),B=makeExpr(level),guard=0;
  // occasionally force equal for variety
  while(A.v===B.v && Math.random()<0.6 && guard++<8) B=makeExpr(level);
  let ans = A.v>B.v?'A':A.v<B.v?'B':'=';
  return {A,B,ans};
}
const modeCompare={ id:'compare', track:'quant',
  gen(level){ const c=genCompare(level);
    const opts=['Column A is greater','Column B is greater','They are equal'];
    const correct = c.ans==='A'?opts[0]:c.ans==='B'?opts[1]:opts[2];
    return {
      prompt:'Which is bigger?',
      stemHTML:`<div class="cols-compare">
        <div class="colbox"><div class="lab">Column A</div><div class="expr">${c.A.t}</div></div>
        <div class="vs">vs</div>
        <div class="colbox"><div class="lab">Column B</div><div class="expr">${c.B.t}</div></div></div>`,
      options:opts, correct, why:`Column A = ${c.A.v} and Column B = ${c.B.v}.`, cls:'quant', optClass:'c3'
    };
  }
};
// -- Logic ordering puzzles --
const NAMES=['Maya','Leo','Sam','Ava','Noah','Mia','Kai','Zoe','Ben','Ella','Omar','Lily'];
const SCEN=[
  {noun:'tall',hi:'taller than',lo:'shorter than',top:'tallest',bot:'shortest',rank:'from tallest to shortest'},
  {noun:'old',hi:'older than',lo:'younger than',top:'oldest',bot:'youngest',rank:'from oldest to youngest'},
  {noun:'fast',hi:'finished ahead of',lo:'finished behind',top:'first',bot:'last',rank:'from first to last'},
  {noun:'score',hi:'scored higher than',lo:'scored lower than',top:'highest score',bot:'lowest score',rank:'from highest to lowest'},
];
function genLogic(level){
  const k = level<=2?3 : level<=4?4 : 5;
  const sc=choice(SCEN);
  const people=shuffle(NAMES).slice(0,k);      // order[0] is the "top" (tallest/oldest/first/highest)
  // build clues from consecutive pairs, shuffled + randomly phrased
  const clues=[];
  for(let i=0;i<k-1;i++){
    const hi=people[i], lo=people[i+1];
    if(Math.random()<0.5) clues.push(`${hi} is ${sc.hi} ${lo}.`);
    else clues.push(`${lo} is ${sc.lo} ${hi}.`);
  }
  const shuffledClues=shuffle(clues);
  // question
  const qType=choice(k>=4?['top','bot','nth']:['top','bot']);
  let q, ans;
  if(qType==='top'){ q=`Who is the ${sc.top}?`; ans=people[0]; }
  else if(qType==='bot'){ q=`Who is the ${sc.bot}?`; ans=people[k-1]; }
  else { const pos=rand(2,k-1); q=`Who is in position ${pos} when ranked ${sc.rank}?`; ans=people[pos-1]; }
  return {clues:shuffledClues, options:shuffle(people), correct:ans, q,
    why:`Ranked ${sc.rank}: ${people.join(' → ')}.`};
}
const modeLogic={ id:'logic', track:'quant',
  gen(level){ const p=genLogic(level);
    const lis=p.clues.map(c=>`<li>${c}</li>`).join('');
    return {
      prompt:'Use the clues',
      stemHTML:`<ul class="clues">${lis}</ul><div class="scenario">${p.q}</div>`,
      options:p.options, correct:p.correct, why:p.why, cls:'quant',
      optClass: p.options.length>=4?'c2':'c3',
      time: 25+15*p.options.length   // more people = more clues to read
    };
  }
};

/* =========================================================================
   Generic multiple-choice runner
   ========================================================================= */
const MODES=[modeAnalogy,modeSynAnt,modeOdd,modePattern,modeCompare,modeLogic];
const META={
  analogy:{name:'Analogies',ic:'🔗',blurb:'A is to B as C is to…? Spot the matching relationship.'},
  synant:{name:'Synonyms & Antonyms',ic:'🪞',blurb:'Match words that mean the same — or the opposite.'},
  odd:{name:'Odd One Out',ic:'🧩',blurb:'Three words share a category. Find the one that doesn’t.'},
  pattern:{name:'Number Patterns',ic:'🔢',blurb:'Find the rule and predict the next number.'},
  compare:{name:'Quantity Compare',ic:'⚖️',blurb:'Which column is bigger — A, B, or equal?'},
  logic:{name:'Logic Puzzles',ic:'🕵️',blurb:'Order people from clues, then answer the question.'},
};
let answered=false;
function goHome(){ stopTimer(); $('#home').style.display='block'; $('#play').style.display='none'; refreshHome(); }
function openMode(id){ state.mode=id; $('#home').style.display='none'; $('#play').style.display='block';
  $('#subtitle').textContent=META[id].name; load(); }
function load(){
  answered=false; stopTimer();
  const id=state.mode, lvl=modeLevel(id);
  $('#mLevel').textContent=lvl; $('#mStreak').textContent=state.streak;
  $('#feedback').textContent=''; $('#feedback').className='feedback'; $('#nextBtn').style.display='none';
  const mode=MODES.find(m=>m.id===id);
  const ch=mode.gen(lvl); curCh=ch;
  $('#prompt').textContent=ch.prompt;
  const stage=$('#stage'); stage.innerHTML='';
  const stem=document.createElement('div'); stem.innerHTML=ch.stemHTML; stage.appendChild(stem);
  const opts=document.createElement('div');
  opts.className='opts '+(ch.cls||'')+' '+(ch.optClass|| (ch.options.length===4?'c2':ch.options.length===3?'c3':'c2'));
  ch.options.forEach(o=>{
    const b=document.createElement('div'); b.className='opt'; b.innerHTML=o;
    b.onclick=()=>{
      if(answered)return;
      document.querySelectorAll('.opt').forEach(e=>e.classList.add('locked'));
      const ok = (o===ch.correct);
      b.classList.add(ok?'pick-right':'pick-wrong');
      if(!ok)[...opts.children].forEach(c=>{ if(c.textContent===String(ch.correct)) c.classList.add('reveal-right'); });
      resolve(ok, ch, o);
    };
    opts.appendChild(b);
  });
  stage.appendChild(opts);
  startTimer(timeFor(ch));
}
function resolve(ok, ch, chosen, timedOut){
  answered=true; stopTimer();
  state.total++;
  const fb=$('#feedback');
  if(ok){
    state.streak++; state.correct[state.mode]=(state.correct[state.mode]||0)+1; award(10*modeLevel(state.mode)); sndRight();
    if(state.streak>state.best) state.best=state.streak;
    fb.className='feedback good'; fb.innerHTML='✓ Correct! <span class="why">'+ch.why+'</span>';
  }else if(timedOut){
    state.streak=0; sndWrong();
    fb.className='feedback timeup';
    fb.innerHTML='⏱ Time\'s up — the answer is <b>'+ch.correct+'</b>. <span class="why">'+ch.why+'</span>';
  }else{
    state.streak=0; sndWrong();
    fb.className='feedback bad';
    fb.innerHTML='✗ The answer is <b>'+ch.correct+'</b>. <span class="why">'+ch.why+'</span>';
  }
  $('#mStreak').textContent=state.streak;
  persist();
  $('#nextBtn').style.display='inline-block'; $('#nextBtn').focus();
}

/* ---------------- home ---------------- */

  const m=META[id], mode=MODES.find(x=>x.id===id);

  c.innerHTML=`<div class="lvlchip">LVL ${modeLevel(id)}</div>
    <span class="ic">${m.ic}</span><h3>${m.name}</h3><p>${m.blurb}</p>`;
  c.onclick=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} openMode(id); };
  return c;
}

  refreshRank();
  $('#timedToggle').checked=state.timed;
  $('#statsLine').innerHTML = `Answered <b>${state.total}</b> · Best streak <b>${state.best}</b>`

  MODES.filter(m=>m.track==='verbal').forEach(m=>v.appendChild(card(m.id)));

$('#backBtn').onclick=goHome;

  state.timed=e.target.checked; persist();

};
// two-step reset: avoids confirm() dialogs, which some embedded viewers block
let resetArmed=false, resetTid=null;
$('#resetBtn').onclick=()=>{
  const b=$('#resetBtn');
  if(!resetArmed){
    resetArmed=true; b.textContent='Tap again to erase everything';
    clearTimeout(resetTid); resetTid=setTimeout(()=>{resetArmed=false; b.textContent='Reset progress';},4000);
    return;
  }
  clearTimeout(resetTid); resetArmed=false; b.textContent='Reset progress';
  state.xp=0; state.correct={}; state.best=0; state.total=0; state.streak=0; state.used={};
  Store.clear(); persist(); refreshHome(); toast('Progress reset');
};
restore();
